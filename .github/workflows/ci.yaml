name: Python Checks
on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:
jobs:
  autoformat:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version-file: pyproject.toml
    - uses: astral-sh/setup-uv@v6
      with:
        enable-cache: false
    - run: echo "UV_PYTHON=$pythonLocation" >> $GITHUB_ENV
    - run: uv pip install $(uv export --no-hashes --frozen | grep '^ruff==')
    - run: uv run --frozen --no-sync -- ruff format . --check
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version-file: pyproject.toml
    - uses: astral-sh/setup-uv@v6
      with:
        enable-cache: false
    - run: echo "UV_PYTHON=$pythonLocation" >> $GITHUB_ENV
    - run: uv pip install $(uv export --no-hashes --frozen | grep '^ruff==')
    - run: |
        uv run --frozen --no-sync -- ruff check .
  typecheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version-file: pyproject.toml
    - uses: astral-sh/setup-uv@v6
      with:
        enable-cache: false
    - run: echo "UV_PYTHON=$pythonLocation" >> $GITHUB_ENV
    - run: uv sync --frozen --all-extras
    - run: uv pip install ty
    - name: Typecheck
      run: uv run --frozen -- ty check
  # The embedded vpic.rkyv is gitignored, so the extension only decodes real VINs
  # if the artifact is materialized first. Build it once (deterministically from
  # the pinned dump) and hand it to the test jobs — otherwise build.rs bakes in an
  # empty stub and the parity corpus fails wholesale.
  data:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - uses: ./.github/actions/build-data
    - uses: actions/upload-artifact@v4
      with:
        name: vpic-data
        path: crates/ultravin-core/data/vpic.rkyv
        if-no-files-found: error
  test:
    needs: data
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - uses: astral-sh/setup-uv@v6
      with:
        enable-cache: false
    # Place the artifact where include_bytes! expects it, before uv sync builds
    # the extension (build.rs leaves an existing file untouched).
    - uses: actions/download-artifact@v4
      with:
        name: vpic-data
        path: crates/ultravin-core/data
    - run: echo "UV_PYTHON=$pythonLocation" >> $GITHUB_ENV
    - run: uv sync --frozen --all-extras
    - name: Test with python ${{ matrix.python-version }}
      run: uv run --frozen --all-extras -- pytest -v