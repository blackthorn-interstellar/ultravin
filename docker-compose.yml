# Postgres "oracle" for parity testing: load the pinned vPIC .plain dump and run
# the unmodified vpic.spvindecode against it. Used by `scripts/oracle.sh` and CI.
services:
  oracle:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vpic
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vpic"]
      interval: 2s
      timeout: 3s
      retries: 40
    tmpfs:
      # Keep the 10.9M-row load in RAM; the oracle is ephemeral/disposable.
      - /var/lib/postgresql/data
