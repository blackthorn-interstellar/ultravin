# Parity oracle pool: 5 disk-backed Postgres instances, each the unmodified
# vpic.spvindecode over the pinned dump. Disk-backed (not tmpfs) so 5 fit the
# Docker VM. `oracle` (55432) is the primary used by the single-engine make
# targets; the comprehensive campaign fans out across all five (55432-55436).
x-oracle: &oracle
  image: postgres:16-alpine
  environment:
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: vpic
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres -d vpic"]
    interval: 2s
    timeout: 3s
    retries: 60

services:
  oracle:
    <<: *oracle
    ports: ["55432:5432"]
  oracle2:
    <<: *oracle
    ports: ["55433:5432"]
  oracle3:
    <<: *oracle
    ports: ["55434:5432"]
  oracle4:
    <<: *oracle
    ports: ["55435:5432"]
  oracle5:
    <<: *oracle
    ports: ["55436:5432"]
